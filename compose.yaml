name: notifyclass

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Tokyo
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-notifyclass}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - 127.0.0.1
        - -uroot
        - -p${MYSQL_ROOT_PASSWORD:-root}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  discord:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: ./cmd/discord
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Tokyo
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - app_runtime:/app/runtime

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: ./cmd/app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Tokyo
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - app_runtime:/app/runtime

volumes:
  mysql_data:
  app_logs:
  app_runtime:
