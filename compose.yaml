services:
  db:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notifyclass
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - ./data:/var/lib/mysql
  backend:
    build:
      context: ./pkg
    container_name: backend
    restart: always
    volumes:
      - ./logs:/notifyclass/logs
